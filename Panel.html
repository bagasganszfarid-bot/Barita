<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel FF - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.login-box {
  background: #1e293b;
  padding: 35px;
  width: 350px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 28px;
}

.input-group {
  margin-bottom: 18px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  outline: none;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
  color: #cbd5e1;
}

  </style>
</head>
<body>
  <div class="login-box">
    <h1>Panel FF</h1><form>
  <div class="input-group">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Masukkan username" required />
  </div>

  <div class="input-group">
    <label for="key">Key</label>
    <input type="password" id="key" placeholder="Masukkan key" required />
  </div>

  <button type="submit">Login</button>
</form>

<div class="footer">
  Sistem Login Panel Free Fire
</div>

  </div>
</body>
</html>
