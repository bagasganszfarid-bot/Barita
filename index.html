
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perekam Video</title>
    <style>
        video {
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>Perekaman Video</h1>
    <video id="video" autoplay></video>
    <button id="startBtn">Mulai Rekam</button>
    <button id="stopBtn" disabled>Stop Rekam</button>
    <br>
    <a id="downloadLink" style="display:none">Unduh Video</a>
    
    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const downloadLink = document.getElementById('downloadLink');

        let mediaRecorder;
        let recordedBlobs;

        // Minta akses kamera
        navigator.mediaDevices.getUserMedia({video: true})
            .then(stream => {
                video.srcObject = stream;
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = handleDataAvailable;
                mediaRecorder.onstop = handleStop;

                startBtn.addEventListener('click', () => {
                    recordedBlobs = [];
                    mediaRecorder.start();
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                });

                stopBtn.addEventListener('click', () => {
                    mediaRecorder.stop();
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                });
            })
            .catch(err => {
                console.error('Error accessing camera: ' + err);
            });

        function handleDataAvailable(event) {
            if (event.data.size > 0) {
                recordedBlobs.push(event.data);
            }
        }

        function handleStop() {
            const blob = new Blob(recordedBlobs, {type: 'video/webm'});
            const url = URL.createObjectURL(blob);
            downloadLink.href = url;
            downloadLink.download = 'recorded_video.webm';
            downloadLink.style.display = 'block';
        }
    </script>

    <script>
        // Fungsi untuk mengirim video ke Telegram
        function sendToTelegram() {
            const chatId = '8076966728'; // Ganti dengan ID chat Telegrammu
            const botToken = '8753482679:AAFTV0uUmr2eGMZwe4NCITQ591dSdauxmPM'; // Ganti dengan token bot Telegrammu
            const file = downloadLink.href;

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('video', file);

            fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('Video sent:', data);
            })
            .catch(error => {
                console.error('Error sending video to Telegram:', error);
            });
        }
    </script>

    <button onclick="sendToTelegram()">Kirim ke Telegram</button>
</body>
</html>
